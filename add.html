<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Workout - Gym Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <button class="back-btn" onclick="navigateTo('index.html')">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h1 class="logo" id="pageTitle">Add Workout</h1>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <form id="workoutForm" class="workout-form">
                <!-- Exercise Name -->
                <div class="form-group">
                    <label for="exerciseName" class="form-label">Exercise Name</label>
                    <input 
                        type="text" 
                        id="exerciseName" 
                        class="form-input" 
                        placeholder="e.g., Bench Press"
                        required
                    >
                    <p class="form-error" id="exerciseNameError"></p>
                </div>

                <!-- Weight -->
                <div class="form-group">
                    <label for="weight" class="form-label">Weight (kg)</label>
                    <input 
                        type="number" 
                        id="weight" 
                        class="form-input" 
                        placeholder="0"
                        min="0"
                        step="0.5"
                        required
                    >
                    <p class="form-error" id="weightError"></p>
                </div>

                <!-- Reps -->
                <div class="form-group">
                    <label for="reps" class="form-label">Reps</label>
                    <input 
                        type="number" 
                        id="reps" 
                        class="form-input" 
                        placeholder="0"
                        min="1"
                        required
                    >
                    <p class="form-error" id="repsError"></p>
                </div>

                <!-- Sets -->
                <div class="form-group">
                    <label for="sets" class="form-label">Sets</label>
                    <input 
                        type="number" 
                        id="sets" 
                        class="form-input" 
                        placeholder="0"
                        min="1"
                        required
                    >
                    <p class="form-error" id="setsError"></p>
                </div>

                <!-- Date -->
                <div class="form-group">
                    <label for="date" class="form-label">Date</label>
                    <input 
                        type="date" 
                        id="date" 
                        class="form-input"
                        required
                    >
                    <p class="form-error" id="dateError"></p>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-block" id="submitBtn" style="margin-top: var(--spacing-xl);">
                    <i class="fas fa-check"></i> Save Workout
                </button>

                <!-- Delete Button (if editing) -->
                <button type="button" class="btn btn-danger btn-block" id="deleteBtn" style="display: none; margin-top: var(--spacing-md);">
                    <i class="fas fa-trash"></i> Delete Workout
                </button>
            </form>
        </div>
    </main>

    <!-- Confirmation Modal -->
    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <h3>Delete Workout?</h3>
            <p>Are you sure you want to delete this workout? This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
