<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workouts - Gym Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <button class="menu-btn" id="menuBtn">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="logo">Workouts</h1>
            </div>
            <button class="add-btn" onclick="navigateTo('add.html')">
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <nav class="menu-nav">
            <a href="index.html" class="menu-link">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="workouts.html" class="menu-link active">
                <i class="fas fa-dumbbell"></i> Workouts
            </a>
            <a href="add.html" class="menu-link">
                <i class="fas fa-plus-circle"></i> Add Workout
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Filters Section -->
            <section class="filters-section" style="margin-bottom: var(--spacing-2xl);">
                <div style="flex: 1; display: flex; gap: var(--spacing-md);">
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="form-input" 
                        placeholder="Search exercises..."
                        style="flex: 1;"
                    >
                    <input 
                        type="date" 
                        id="dateFilter" 
                        class="form-input"
                        style="flex: 0.8;"
                    >
                </div>
                <button class="btn btn-secondary btn-sm" id="clearFiltersBtn" onclick="clearFilters()">
                    <i class="fas fa-times"></i> Clear
                </button>
            </section>

            <!-- Workouts List -->
            <section class="workouts-section">
                <div id="workoutsList" class="workouts-list">
                    <!-- Workouts will be added here -->
                </div>
                <div id="noResults" class="empty-state" style="display: none;">
                    <i class="fas fa-search"></i>
                    <p>No workouts found</p>
                    <button class="btn btn-primary" onclick="navigateTo('add.html')">
                        Add a Workout
                    </button>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 AZMY EHAB - Gym Tracker</p>
        <div class="social-links">
           <a href="https://t.snapchat.com/TVFCi2Fm" target="_blank" title="Snapchat">

  </svg>
</a>

<a href="https://x.com/AZMYEHAB21" target="_blank" title="Twitter">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
    <path fill="#000" d="M18.9 2H22l-6.8 7.8L23 22h-6.2l-5-6.5L6 22H2l7.3-8.4L1 2h6.3l4.6 6.1L18.9 2z"/>
  </svg>
</a>

<a href="https://www.facebook.com/profile.php?id=100083276749464" target="_blank" title="Facebook">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
    <path fill="#000" d="M22 12a10 10 0 1 0-11.5 9.9v-7H8v-3h2.5V9.5c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5H15c-1.2 0-1.5.7-1.5 1.4V12H17l-.5 3h-3v7A10 10 0 0 0 22 12z"/>
  </svg>
</a>

<a href="https://instagram.com/azmy_ehab_" target="_blank" title="Instagram">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
    <path fill="#000" d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm10 2a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3h10zm-5 3.5A4.5 4.5 0 1 0 16.5 12 4.5 4.5 0 0 0 12 7.5zm0 2A2.5 2.5 0 1 1 9.5 12 2.5 2.5 0 0 1 12 9.5z"/>
  </svg>
</a>
        </div>
    </footer>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Confirmation Modal -->
    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <h3>Delete Workout?</h3>
            <p>Are you sure you want to delete this workout? This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
